version: '3.8'

services:
  captcha-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: remote-captcha-service:latest
    container_name: remote-captcha-service
    ports:
      - "8060:8060"
    environment:
      - API_KEY=${API_KEY:-fcs_default_key}
      - PORT=8060
      - HOST=0.0.0.0
      - MAX_BROWSERS=${MAX_BROWSERS:-2}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-1800}
      # Kookeey 住宅代理网关（每次连接自动切换 IP）
      - BROWSER_PROXY_URL=${BROWSER_PROXY_URL:-http://9433501-6b5d3a3d:73779b25-US@gate.kookeey.info:1000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Token 池配置
      - POOL_SIZE=${POOL_SIZE:-10}
      - TOKEN_TTL=${TOKEN_TTL:-90}
      - POOL_WORKERS=${POOL_WORKERS:-3}
      - POOL_BROWSER_MAX_USES=${POOL_BROWSER_MAX_USES:-20}
      - POOL_COOLDOWN=${POOL_COOLDOWN:-3}
      - POOL_ENABLED=${POOL_ENABLED:-true}
      # Xvfb 显示
      - DISPLAY=:99
      - XVFB_WHD=1920x1080x24
      - PYTHONUNBUFFERED=1
    shm_size: "2gb"
    restart: unless-stopped
